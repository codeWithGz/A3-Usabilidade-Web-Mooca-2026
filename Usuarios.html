<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de produtos</title>
    <script src="https://code.iconify.design/iconify-icon/3.0.2/iconify-icon.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="assets/js/handlebars.min.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <iconify-icon icon="lucide:package" class="fs-2 me-1"></iconify-icon>
            <span class="navbar-brand">Catálogo de Produtos</span>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                
                <div class="d-flex me-auto mb-2 mb-lg-0" role="search">
                    <input id="searchInput" class="form-control me-2" type="search" placeholder="Buscar nome em inglês..." aria-label="Search" oninput="filtrarProdutos()" />
                    <button class="btn btn-outline-success" type="button" onclick="filtrarProdutos()">Buscar</button>
                </div>
                
                <a href="favoritos.html" class="btn btn-warning d-flex align-items-center fw-bold">
                    Favoritos
                    <iconify-icon icon="lucide:star" class="ms-2" style="fill: currentColor;"></iconify-icon>
                </a>

            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3 mb-3 d-flex justify-content-end">
        <button id="btnOrdenar" class="btn btn-outline-primary d-flex align-items-center fw-bold" onclick="ordenarPorPreco()">
            <iconify-icon icon="lucide:arrow-up-down" class="me-2"></iconify-icon>
            Ordenar por Preço
        </button>
    </div>

    <div class="row" id="ProductsList">
        <!-- OS DADOS SERÃO INSERIDOS AQUI-->
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
